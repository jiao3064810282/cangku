<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人介绍卡 · 王小明</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: linear-gradient(145deg, #f9e7e0 0%, #e3d9e8 100%);
            padding: 1.5rem;
            background-attachment: fixed;
        }
        .card {
            max-width: 520px;
            width: 100%;
            background: #ffffff;
            border-radius: 40px;
            padding: 2.8rem 2.2rem;
            box-shadow: 0 20px 40px -12px rgba(0,0,0,0.20), 0 8px 24px -6px rgba(0,0,0,0.08);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 28px 48px -16px rgba(0,0,0,0.25);
        }
        .emoji-big {
            font-size: 4.8rem;
            line-height: 1.2;
            margin-bottom: 0.5rem;
            display: block;
        }
        .name {
            font-size: 2.6rem;
            font-weight: 600;
            color: #2d2a3e;
            margin-top: 0.2rem;
            margin-bottom: 0.25rem;
            background: linear-gradient(135deg, #3f3a5a, #5b4e7a);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }
        .tagline {
            font-size: 1.2rem;
            font-weight: 300;
            color: #6b6080;
            letter-spacing: 0.06em;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px dashed rgba(107,96,128,0.20);
            display: inline-block;
            padding-left: 1rem;
            padding-right: 1rem;
        }
        .bio {
            font-size: 1.05rem;
            line-height: 1.7;
            color: #2e2a3c;
            background: rgba(245,240,250,0.4);
            padding: 1.2rem 1.6rem;
            border-radius: 28px;
            margin-top: 0.6rem;
            margin-bottom: 0.2rem;
            border: 1px solid rgba(255,255,255,0.5);
        }
        .bio::before {
            content: "✨ ";
            opacity: 0.7;
        }
        .bio::after {
            content: " ✨";
            opacity: 0.7;
        }
        .card-footer {
            margin-top: 1.8rem;
            font-size: 0.8rem;
            color: #b3a9c7;
            letter-spacing: 1px;
            font-weight: 300;
            opacity: 0.7;
            border-top: 1px solid rgba(179,169,199,0.2);
            padding-top: 1rem;
        }
        @media (max-width: 480px) {
            .card { padding: 2rem 1.5rem; border-radius: 32px; }
            .name { font-size: 2.2rem; }
            .emoji-big { font-size: 4rem; }
            .bio { font-size: 0.98rem; padding: 1rem 1.2rem; }
            .tagline { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="emoji-big">🚀</span>
        <h1 class="name">王小明</h1>
        <div class="tagline">✦ 探索 · 创造 · 保持好奇 ✦</div>
        <p class="bio">
            热爱编程与设计的终身学习者。相信简单即力量，喜欢用代码构建实用工具，也乐于分享知识。目前正探索全栈与AI，保持好奇，每日进步。
        </p>
        <div class="card-footer">✦ 欢迎交流 ✦</div>
    </div>
</body>
</html>
